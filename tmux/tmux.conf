# ~/.tmux.conf


# PREFIX: C-b (default) and C-a (secondary, screen-like)
set-option -g prefix2 C-a
bind-key C-a send-prefix -2

# PREFIX r — reload this config
bind r source-file ~/.tmux.conf

set-option -g mouse on
# PREFIX m — toggle mouse on/off (useful to allow Shift+drag in PuTTY)
bind m set-option -g mouse \; display-message "mouse: #{?mouse,on,off}"
set -sg escape-time 10        # reduce esc delay for vim (default: 500ms)
set -g focus-events on        # vim autoread/FocusGained support
set -g renumber-windows on    # keep window numbers contiguous


# PANE SPLITTING (override: adds current path, adds | and - as aliases)
# PREFIX "   — split horizontal
# PREFIX %   — split vertical
# PREFIX -   — split horizontal (alias)
# PREFIX |   — split vertical (alias)
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# PANE NAVIGATION (override: vi-style hjkl instead of arrow keys)
# PREFIX h/j/k/l — move left/down/up/right
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# WINDOWS
# PREFIX C — prompt for name and open new window
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-window-option -g automatic-rename
bind-key C command-prompt -p "Master, please provide a new window name: " "new-window -n '%%'"


# COPY MODE (vi) — deps: xclip (X11) or wl-clipboard (Wayland)
# PREFIX [       — enter copy mode
# v              — begin selection
# V              — select line
# C-v            — rectangle/block select
# y / Enter      — yank to system clipboard and exit copy mode
# q              — cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# yank: prefer wl-copy (Wayland), fall back to xclip (X11)
if-shell 'command -v wl-copy' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"'

if-shell 'command -v wl-copy' \
  'bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"' \
  'bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"'


# STATUS BAR
set-option -g default-terminal "tmux-256color"
set-option -g status-keys vi
set-option -g status-position bottom
set-option -g status-interval 2
set-option -g status-justify left
set-option -g status-left ''
# right: session:window:pane  hostname  date/time
set-option -g status-right-length 50
set-option -g status-left-length 20
set-option -g display-time 5000
set-option -g display-panes-time 2000

# heavy border lines use bold Unicode box-drawing chars for sharper pane dividers
set -g pane-border-lines heavy

# colors react to vtheme light/dark via ~/.theme-bash-tmux-vim (reloaded by vtheme)
if-shell 'test "$(cat ~/.theme-bash-tmux-vim 2>/dev/null)" = "light"' {
  set-option -g status-bg colour250
  set-option -g status-fg colour234
  set-option -g status-right "#[fg=colour22,bg=colour250,bold]#S:@#I:#P #[fg=colour18,bg=colour250,bold] [#H] #[fg=colour52,bg=colour250,bold] %Y-%m-%d %H:%M:%S"
  set-window-option -g window-status-current-format ' #I#[fg=colour22]:#[fg=colour22]#W#[fg=colour22]#F '
  set-window-option -g window-status-format ' #I#[fg=colour240]:#[fg=colour240]#W#[fg=colour240]#F '
  set -g mode-style                   bg=colour246,bold,fg=colour232
  set -g window-status-current-style  bg=colour246,bold,fg=colour22
  set -g window-status-bell-style     bg=colour1,bold,fg=colour255
  set -g pane-border-style            fg=colour240
  set -g pane-active-border-style     fg=colour22
  set -g message-style                fg=colour232,bg=colour250,bold
  set -g message-command-style        fg=colour22,bg=colour250
} {
  set-option -g status-bg colour232
  set-option -g status-fg colour208
  set-option -g status-right "#[fg=colour118,bg=colour232,bold]#S:@#I:#P #[fg=colour226,bg=colour232,bold] [#H] #[fg=colour15,bg=colour232,bold] %Y-%m-%d %H:%M:%S"
  set-window-option -g window-status-current-format ' #I#[fg=colour214]:#[fg=colour214]#W#[fg=colour214]#F '
  set-window-option -g window-status-format ' #I#[fg=colour214]:#[fg=colour214]#W#[fg=colour214]#F '
  set -g mode-style                   bg=colour233,bold,fg=colour214
  set -g window-status-current-style  bg=colour232,bold,fg=colour214
  set -g window-status-bell-style     bg=colour1,bold,fg=colour255
  set -g pane-border-style            fg=colour160
  set -g pane-active-border-style     fg=colour82,bg=colour232
  set -g message-style                fg=colour214,bg=colour232,bold
  set -g message-command-style        fg=blue,bg=black
}

set-option -g visual-activity on
set-option -g visual-bell on
set-option -g visual-silence off
set-option -g bell-action none

set-window-option -g monitor-activity on
set-window-option -g clock-mode-colour colour214


# PLUGINS (TPM — Tmux Plugin Manager)
# PREFIX I       — install plugins
# PREFIX U       — update plugins
# PREFIX M-u     — remove unused plugins
set -g @plugin 'tmux-plugins/tpm'

# tmux-resurrect: persist sessions across system restarts
# PREFIX C-s     — save session
# PREFIX C-r     — restore session
set -g @plugin 'tmux-plugins/tmux-resurrect'

# auto-install missing plugins on startup (no PREFIX I needed)
if "test ! -d ~/.tmux/plugins/tmux-resurrect" \
  "run '~/.tmux/plugins/tpm/tpm install'"

# keep this line at the very end of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
